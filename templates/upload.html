<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="card shadow p-5">

        <h2 class="text-center mb-4">

            Upload Resume(s)

        </h2>

        <p class="text-center text-muted">

            Select one resume to receive a detailed review or upload multiple resumes for candidate ranking.

        </p>

        <form method="POST"
              enctype="multipart/form-data">

            <div class="mb-4">

                <label class="form-label">

                    Select PDF Resume(s)

                </label>

                <input
                    type="file"
                    class="form-control"
                    name="resume"
                    accept=".pdf"
                    multiple
                    required>

            </div>

            <div class="text-center">

                <button
                    class="btn btn-primary btn-lg">

                    Analyze Resume(s)

                </button>

            </div>

        </form>

    </div>

</div>

</body>

</html>
